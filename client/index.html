<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mafia</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="game-area">
        <h1>Main Game</h1>
        <div class="main-page">
            <div class="players"></div>
            <button class="createRoom">Create Room</button>
            <button class="joinRoom">Join Room</button>
            <button class="changeName">Change Name</button>
            <button class="renameButton">Rename</button>
            <input type="text" class="renameInput">
            <div class="roomCode"></div>
            <input type="text" class="joinRoomCode">
            <button class="startGame">Start</button>
            <button class="send">Join</button>
            <button class="backButton">Back</button>
        </div>
      </div>
      <div class="chat-area">
        <div class="topBar">
            <h1>Chat</h1>
            <div class="online">
                <div id="online-count">Online(Global): 0</div>
                <div class="online-count-room">Online(Room): 0</div>
            </div>
        </div>
        <div class="messages"></div>
        <input type="text" placeholder="Press / to chat" />
      </div>
    </div>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script type="module" src="server.js"></script>
  </body>
</html>
